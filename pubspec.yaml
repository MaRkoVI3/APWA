name: apwais
description: A digital wellbeing app that helps you maintain a healthy relationship with your phone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  permission_handler: ^12.0.1
  usage_stats: ^1.3.1
  geolocator: ^14.0.2
  flutter_local_notifications: ^21.0.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true